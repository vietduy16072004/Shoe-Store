<div class="flex h-screen bg-slate-50 overflow-hidden font-sans text-slate-900">
  <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-50">
    <div class="p-6">
      <div class="flex items-center gap-4 bg-white/5 p-4 rounded-[2rem] border border-white/10 shadow-inner">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i class="fas fa-shoe-prints text-white text-lg"></i>
        </div>
        <div>
          <h1 class="font-black text-base uppercase tracking-tighter leading-none">SHOE STORE</h1>
          <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Manager</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-4 space-y-1.5 overflow-y-auto custom-scroll py-4">
      <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 px-4">Hệ thống quản lý</p>
      
      <a routerLink="/product-list" routerLinkActive="active-link" 
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-box w-5 text-center group-hover:text-indigo-400"></i> Sản phẩm
      </a>

      <a routerLink="/brand" routerLinkActive="active-link"
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-tags w-5 text-center group-hover:text-indigo-400"></i> Thương hiệu
      </a>

      <a routerLink="/category" routerLinkActive="active-link"
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-th-list w-5 text-center group-hover:text-indigo-400"></i> Loại giày
      </a>

      <a routerLink="/size" routerLinkActive="active-link"
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-ruler-horizontal w-5 text-center group-hover:text-indigo-400"></i> Kích thước giày
      </a>

      <a routerLink="/variant" routerLinkActive="active-link"
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-palette w-5 text-center group-hover:text-indigo-400"></i> Màu giày
      </a>

      <a routerLink="/discount" routerLinkActive="active-link"
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-percentage w-5 text-center group-hover:text-indigo-400"></i> Sự kiện giảm giá
      </a>

      <a routerLink="/orders" routerLinkActive="active-link"
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-receipt w-5 text-center group-hover:text-indigo-400"></i> Tổng đơn hàng
      </a>

      <a routerLink="/user" routerLinkActive="active-link"
         class="flex items-center gap-4 px-6 py-3 rounded-2xl text-slate-400 font-bold text-[13px] transition-all hover:bg-white/5 group">
        <i class="fas fa-users-cog w-5 text-center group-hover:text-indigo-400"></i> Quản lý User
      </a>
    </nav>

    <div class="p-6 border-t border-white/5">
      <div class="flex items-center gap-4 p-4 bg-white/5 rounded-[2rem] border border-white/10 hover:bg-white/10 transition-all group">
        
        <div routerLink="/profile" class="flex items-center gap-4 flex-1 cursor-pointer">
          <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-500 flex items-center justify-center font-black shadow-lg shadow-indigo-500/20 group-hover:scale-110 transition-transform">
            {{ username.charAt(0).toUpperCase() }}
          </div>
          <div class="flex-1 overflow-hidden">
            <p class="text-xs font-black truncate uppercase tracking-tight">{{ username }}</p>
            <p class="text-[9px] text-indigo-400 font-black uppercase tracking-widest">Administrator</p>
          </div>
        </div>

        <button (click)="onLogout()" class="text-slate-500 hover:text-red-500 transition-colors">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 h-screen overflow-y-auto custom-scroll flex flex-col bg-slate-100">
    <header class="bg-white/80 backdrop-blur-xl px-8 py-4 border-b border-slate-200/60 flex justify-between items-center sticky top-0 z-40 shadow-sm/50">
      <h2 class="text-xl font-black text-slate-800 tracking-tight">Trang quản trị</h2>
      <div class="flex gap-4 items-center">
         <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" placeholder="Tìm nhanh..." class="pl-12 pr-4 py-2.5 bg-slate-100 rounded-xl text-xs font-bold outline-none focus:ring-2 ring-indigo-500 transition-all w-64 border border-slate-200">
         </div>
         <button class="w-10 h-10 bg-white rounded-xl shadow-sm text-slate-400 hover:text-indigo-600 border border-slate-200 transition-all relative group">
            <i class="fas fa-bell"></i>
            <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
         </button>
      </div>
    </header>

    <div class="px-10 pb-10">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
