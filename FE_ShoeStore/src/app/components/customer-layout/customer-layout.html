<div class="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-900">
  <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-xl">
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-10">
        <a routerLink="/home" class="text-2xl font-black italic tracking-tighter uppercase flex items-center gap-2">
          <i class="fas fa-shoe-prints text-indigo-500"></i> SHOE STORE
        </a>
      </div>

      <div class="flex items-center gap-6">
        <button (click)="openSearchModal()" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center hover:bg-white/10 transition-all border border-white/10">
          <i class="fas fa-search text-slate-400"></i>
        </button>

        <button *ngIf="username" routerLink="/cart" class="relative w-10 h-10 bg-white/5 rounded-full flex items-center justify-center hover:bg-white/10 transition-all border border-white/10 group">
          <i class="fas fa-shopping-bag text-slate-400 group-hover:text-indigo-400"></i>
        </button>

        <div *ngIf="!username" class="flex gap-3">
          <a routerLink="/account/login" class="text-[10px] font-black uppercase tracking-widest px-6 py-2.5 rounded-full border border-white/20 hover:bg-white/10 transition-all">Đăng nhập</a>
          <a routerLink="/account/register" class="text-[10px] font-black uppercase tracking-widest px-6 py-2.5 rounded-full bg-indigo-600 hover:bg-indigo-700 transition-all shadow-lg">Đăng ký</a>
        </div>

        <div class="flex items-center gap-6">
            <div *ngIf="username" routerLink="/profile" class="flex items-center gap-4 bg-white/5 pl-4 pr-2 py-2 rounded-full border border-white/10 cursor-pointer hover:bg-white/10 transition-all">
                <span class="text-[10px] font-black uppercase tracking-widest text-indigo-400">{{ username }}</span>
                <button (click)="onLogout(); $event.stopPropagation()" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-sign-out-alt text-xs"></i>
                </button>
            </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="flex-1"><router-outlet></router-outlet></main>

  <div *ngIf="isSearchOpen" class="fixed inset-0 z-[100] flex items-start justify-center pt-32 p-6">
    <div class="absolute inset-0 bg-black/20 backdrop-blur-[2px] animate-in fade-in" (click)="isSearchOpen = false"></div>
    
    <div class="bg-[#141414]/40 backdrop-blur-3xl w-full max-w-2xl rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.3)] z-10 p-10 border border-white/5 animate-in zoom-in duration-300">
        <input [(ngModel)]="searchQuery" (input)="onSearch()" type="text" placeholder="Nhập tên sản phẩm..."
               class="w-full text-2xl font-black text-white bg-transparent border-b border-white/10 pb-4 outline-none placeholder:text-white/20 focus:border-indigo-500 transition-all">
        
        <div class="mt-6 max-h-[400px] overflow-y-auto custom-scroll pr-2">
            <div *ngFor="let p of searchResults" [routerLink]="['/product', p.product_Id]" (click)="isSearchOpen = false"
                 class="flex items-center gap-5 p-4 hover:bg-white/5 rounded-3xl cursor-pointer group transition-all">
                <img [src]="p.imageUrl" class="w-16 h-16 object-cover rounded-2xl shadow-xl border border-white/5 group-hover:scale-105 transition-transform">
                <div>
                    <h4 class="font-black text-white uppercase tracking-tight text-sm group-hover:text-indigo-400 transition-colors">{{p.product_Name}}</h4>
                    <p class="text-white/40 font-bold text-xs mt-1">{{p.price | number}} ₫</p>
                </div>
            </div>

            <div *ngIf="searchResults.length === 0 && searchQuery" class="py-12 text-center text-white/10 font-black uppercase text-[9px] tracking-[0.4em]">
                Không tìm thấy kết quả phù hợp
            </div>
        </div>
    </div>
  </div>
</div>
