<div class="fixed inset-0 z-[110] flex items-center justify-center p-6">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" (click)="close.emit()"></div>
  <div class="bg-white w-full max-w-lg rounded-[3rem] shadow-2xl z-10 p-10 animate-in zoom-in duration-500 overflow-hidden">
    <div class="text-center mb-8">
        <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tighter italic">Lựa chọn cấu hình</h3>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">{{product.product_Name}}</p>
    </div>

    <div class="space-y-8">
      <div>
        <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3 block">Màu sắc sản phẩm</label>
        <div class="flex flex-wrap gap-3">
          <button *ngFor="let v of uniqueVariants" (click)="selectedVariantId = v.variants_Id"
                  [class]="selectedVariantId === v.variants_Id ? 'bg-slate-900 text-white shadow-xl' : 'bg-slate-50 text-slate-400'"
                  class="px-6 py-3 rounded-xl font-black text-[10px] uppercase transition-all">
            {{v.variants_Name}}
          </button>
        </div>
      </div>

      <div>
        <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3 block">Chọn kích cỡ (Size)</label>
        <div class="flex flex-wrap gap-3">
          <button *ngFor="let s of uniqueSizes" (click)="selectSize(s.size_Id)"
                  [class]="selectedSizeId === s.size_Id ? 'bg-indigo-600 text-white shadow-indigo-200 shadow-lg' : 'bg-slate-50 text-slate-400'"
                  class="w-12 h-12 flex items-center justify-center rounded-xl font-black text-xs transition-all border-2 border-transparent">
            {{s.size_Name}}
          </button>
        </div>
      </div>

      <div *ngIf="selectedSizeId">
        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border-2 border-slate-100">
           <span class="text-[10px] font-black uppercase text-slate-400">Số lượng mua</span>
           <div class="flex items-center gap-4">
             <button (click)="quantity > 1 && quantity = quantity - 1" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center font-black">-</button>
             <span class="font-black text-slate-900">{{quantity}}</span>
             <button (click)="quantity < maxStock && quantity = quantity + 1" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center font-black">+</button>
           </div>
        </div>
        <p class="text-right text-[9px] font-bold text-green-500 uppercase mt-2">Hiện có: {{maxStock}} sản phẩm</p>
      </div>

      <button (click)="confirmAdd()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-indigo-600 transition-all">
        Xác nhận thêm vào giỏ
      </button>
    </div>
  </div>
</div>
