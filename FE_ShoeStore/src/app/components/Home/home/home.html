<div class="container mx-auto p-6 lg:p-10 animate-in fade-in duration-700">
  
  <div class="flex flex-wrap gap-4 mb-12 bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 items-center">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-500">
            <i class="fas fa-tags text-xs"></i>
        </div>
        <select [(ngModel)]="filters.brandId" (change)="applyFilter()" 
                class="bg-slate-50 px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest outline-none border-2 border-transparent focus:border-indigo-500 transition-all cursor-pointer">
            <option [ngValue]="null">Thương hiệu (Tất cả)</option>
            <option *ngFor="let b of brands" [value]="b.brand_Id">{{ b.brand_Name }}</option>
        </select>
    </div>
    
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-500">
            <i class="fas fa-th-large text-xs"></i>
        </div>
        <select [(ngModel)]="filters.categoryId" (change)="applyFilter()" 
                class="bg-slate-50 px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest outline-none border-2 border-transparent focus:border-indigo-500 transition-all cursor-pointer">
            <option [ngValue]="null">Loại giày (Tất cả)</option>
            <option *ngFor="let c of categories" [value]="c.category_Id">{{ c.category_Name }}</option>
        </select>
    </div>

    <div *ngIf="filters.brandId || filters.categoryId" class="ml-auto">
        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Đang áp dụng bộ lọc</span>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
    <div *ngFor="let item of products" 
         class="bg-white rounded-[3.5rem] p-8 border border-slate-100 shadow-sm hover:shadow-2xl transition-all duration-500 group relative">
      
      <div class="relative overflow-hidden rounded-[2.5rem] mb-8 aspect-square bg-slate-50">
        <img [src]="item.imageUrl" 
             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
             [alt]="item.product_Name">
        
        <div *ngIf="item.discount > 0" 
             class="absolute top-6 left-6 bg-red-500 text-white px-5 py-2 rounded-full font-black text-[11px] uppercase shadow-xl shadow-red-200 animate-pulse">
          -{{ item.discount }}% OFF
        </div>
      </div>
      
      <div class="space-y-2 mb-8">
        <p class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em]">{{ item.brand_Name }}</p>
        <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter italic line-clamp-1 group-hover:text-indigo-600 transition-colors">
            {{ item.product_Name }}
        </h3>
      </div>
      
      <div class="flex items-baseline gap-4 mb-10">
        <span class="text-3xl font-black text-slate-900 tracking-tight">
            {{ item.finalPrice | number:'1.0-0' }}<span class="text-sm ml-1">₫</span>
        </span>
        <span *ngIf="item.discount > 0" class="text-sm text-slate-300 line-through font-bold">
            {{ item.price | number:'1.0-0' }} ₫
        </span>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button [routerLink]="['/admin/product-detail', item.product_Id]" 
                class="bg-slate-50 text-slate-900 py-5 rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all shadow-sm">
            Chi tiết
        </button>
        <button (click)="openAddToCart(item)" 
                class="bg-indigo-600 text-white py-5 rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all transform active:scale-95">
          <i class="fas fa-shopping-cart mr-2"></i> Mua ngay
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="products.length === 0" class="text-center py-40 animate-in fade-in zoom-in duration-500">
    <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-8">
        <i class="fas fa-box-open text-slate-300 text-3xl"></i>
    </div>
    <h4 class="text-xl font-black text-slate-900 uppercase tracking-tighter italic">Rất tiếc!</h4>
    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-3">Không có sản phẩm nào phù hợp với yêu cầu của bạn</p>
    <button (click)="filters = { search: '', brandId: null, categoryId: null, minPrice: 0, maxPrice: 5000000, page: 1 }; loadData()" 
            class="mt-10 text-indigo-600 font-black text-[10px] uppercase tracking-widest underline underline-offset-8 decoration-2">
        Thiết lập lại bộ lọc
    </button>
  </div>
</div>

<app-add-to-cart *ngIf="selectedProduct" 
                 [product]="selectedProduct" 
                 (close)="selectedProduct = null">
</app-add-to-cart>
