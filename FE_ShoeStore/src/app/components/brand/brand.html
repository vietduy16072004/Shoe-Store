<div class="animate-in fade-in duration-700">
    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter italic">Quản lý Thương hiệu</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Tổng cộng: {{brands.length}} thương hiệu</p>
        </div>
        <button (click)="openAddModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl hover:bg-indigo-700 transition-all transform active:scale-95">
            <i class="fas fa-plus mr-2"></i> Thêm Thương hiệu
        </button>
    </div>

    <div class="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50/50">
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Tên thương hiệu</th>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Số lượng SP</th>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Hành động</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr *ngFor="let b of brands" class="hover:bg-slate-50/50 transition-colors group">
                    <td class="px-8 py-6 font-black text-slate-400 text-xs">#{{ b.brand_Id }}</td>
                    <td class="px-8 py-6">
                        <p class="font-black text-slate-900 uppercase tracking-tighter italic text-sm group-hover:text-indigo-600 transition-all">
                            {{ b.brand_Name }}
                        </p>
                    </td>
                    <td class="px-8 py-6">
                        <span class="bg-indigo-50 text-indigo-600 text-[9px] font-black uppercase tracking-widest px-4 py-2 rounded-full border border-indigo-100">
                            {{ b.productCount }} sản phẩm
                        </span>
                    </td>
                    <td class="px-8 py-6">
                        <div class="flex justify-center gap-2">
                            <button (click)="openEditModal(b)" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                            <button (click)="onDelete(b.brand_Id)" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div *ngIf="isModalOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" (click)="closeModal()"></div>
    <div class="bg-white w-full max-w-lg rounded-[3rem] shadow-2xl z-10 p-12 animate-in zoom-in duration-500">
        <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tighter italic mb-8">
            {{ isEditMode ? 'Cập nhật thương hiệu' : 'Thêm thương hiệu mới' }}
        </h3>
        
        <form (submit)="onSave()" class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-2 block">Tên thương hiệu *</label>
                <input type="text" [(ngModel)]="currentBrand.brand_Name" name="brandName" required
                       class="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-indigo-500 transition-all">
            </div>

            <div class="flex justify-end gap-4 mt-6">
                <button type="button" (click)="closeModal()" class="px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-400 hover:bg-slate-50">Hủy bỏ</button>
                <button type="submit" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700">Xác nhận lưu</button>
            </div>
        </form>
    </div>
</div>
