<div class="container mx-auto p-10 max-w-5xl animate-in fade-in duration-700">
  <div class="grid grid-cols-12 gap-10">
    
    <div class="col-span-12 lg:col-span-4 space-y-6">
      <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 text-center sticky top-24">
        <div class="relative w-36 h-36 mx-auto mb-6">
            <div class="w-full h-full bg-gradient-to-tr from-indigo-600 to-purple-500 rounded-full flex items-center justify-center border-8 border-white shadow-xl">
                <span class="text-5xl font-black text-white uppercase">
                  {{ profile.username ? profile.username.charAt(0) : '?' }}
                </span>
            </div>
            <div class="absolute bottom-1 right-1 w-10 h-10 bg-green-500 border-4 border-white rounded-full shadow-lg"></div>
        </div>
        <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">{{ profile.username }}</h3>
        
        <div class="mt-4 flex justify-center">
          <span [class]="isEditMode ? 'bg-orange-100 text-orange-600' : 'bg-indigo-50 text-indigo-600'" 
                class="text-[9px] font-black uppercase tracking-widest px-4 py-2 rounded-full transition-all">
            Chế độ: {{ isEditMode ? 'Đang chỉnh sửa' : 'Đang xem' }}
          </span>
        </div>
        
        <div class="mt-10 pt-8 border-t border-slate-50 space-y-3">
            <button (click)="openPasswordModal()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-indigo-600 transition-all shadow-lg">
                <i class="fas fa-key mr-2"></i> Đổi mật khẩu
            </button>
            <button (click)="onLogout()" class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all shadow-sm">
                <i class="fas fa-power-off mr-2"></i> Đăng xuất
            </button>
        </div>
      </div>
    </div>

    <div class="col-span-12 lg:col-span-8 space-y-8">
      <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="w-1.5 h-8 bg-indigo-600 rounded-full"></div>
                <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter italic">Thông tin cá nhân</h3>
            </div>
            <button (click)="toggleEdit()" 
                    [class]="isEditMode ? 'bg-green-600 shadow-green-200' : 'bg-slate-900 shadow-slate-200'"
                    class="text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl transition-all hover:scale-105 active:scale-95">
              <i class="fas" [ngClass]="isEditMode ? 'fa-save mr-2' : 'fa-edit mr-2'"></i> 
              {{ isEditMode ? 'Lưu hồ sơ' : 'Chỉnh sửa' }}
            </button>
        </div>

        <form class="space-y-8">
          <div class="grid grid-cols-2 gap-8">
            <div class="col-span-2 md:col-span-1">
              <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3 block ml-1">Email liên hệ</label>
              <input type="email" [(ngModel)]="profile.email" name="email" [disabled]="!isEditMode"
                     class="w-full px-6 py-4 rounded-2xl outline-none font-bold text-slate-700 border-2 transition-all"
                     [class]="isEditMode ? (errors.email ? 'border-red-500 bg-white shadow-lg' : 'border-indigo-500 bg-white shadow-lg shadow-indigo-100') : 'bg-slate-50 border-transparent cursor-not-allowed'">
              <p *ngIf="errors.email" class="text-[9px] text-red-500 font-bold mt-2 ml-2 italic animate-in fade-in">{{ errors.email }}</p>
            </div>

            <div class="col-span-2 md:col-span-1">
              <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3 block ml-1">Số điện thoại</label>
              <input type="text" [(ngModel)]="profile.phone" name="phone" [disabled]="!isEditMode"
                     class="w-full px-6 py-4 rounded-2xl outline-none font-bold text-slate-700 border-2 transition-all"
                     [class]="isEditMode ? (errors.phone ? 'border-red-500 bg-white shadow-lg' : 'border-indigo-500 bg-white shadow-lg shadow-indigo-100') : 'bg-slate-50 border-transparent cursor-not-allowed'">
              <p *ngIf="errors.phone" class="text-[9px] text-red-500 font-bold mt-2 ml-2 italic animate-in fade-in">
                <i class="fas fa-exclamation-circle mr-1"></i> {{ errors.phone }}
              </p>
            </div>
          </div>

          <div>
            <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3 block ml-1">Địa chỉ hiện tại</label>
            <input type="text" [(ngModel)]="profile.address" name="address" [disabled]="!isEditMode"
                   class="w-full px-6 py-4 rounded-2xl outline-none font-bold text-slate-700 border-2 transition-all"
                   [class]="isEditMode ? (errors.address ? 'border-red-500 bg-white shadow-lg' : 'border-indigo-500 bg-white shadow-lg shadow-indigo-100') : 'bg-slate-50 border-transparent cursor-not-allowed'">
            <p *ngIf="errors.address" class="text-[9px] text-red-500 font-bold mt-2 ml-2 italic animate-in fade-in">{{ errors.address }}</p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div *ngIf="isPasswordModalOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300" (click)="closePasswordModal()"></div>
    
    <div class="bg-white w-full max-w-lg rounded-[3rem] shadow-2xl z-10 p-10 animate-in zoom-in slide-in-from-bottom-8 duration-500">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tighter italic">Bảo mật tài khoản</h3>
            <button (click)="closePasswordModal()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:text-red-500 transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form (submit)="onChangePassword()" class="space-y-6">
            <div class="relative">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Mật khẩu cũ</label>
                <input [type]="showOld ? 'text' : 'password'" [(ngModel)]="passData.oldPassword" name="old" 
                       class="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-red-500 transition-all">
                <button type="button" (click)="showOld = !showOld" class="absolute right-5 top-10 text-slate-300 hover:text-red-500">
                    <i class="fas" [ngClass]="showOld ? 'fa-eye-slash' : 'fa-eye'"></i>
                </button>
            </div>

            <div class="relative">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Mật khẩu mới</label>
                <input [type]="showNew ? 'text' : 'password'" [(ngModel)]="passData.newPassword" name="new"
                       class="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-red-500 transition-all">
                <button type="button" (click)="showNew = !showNew" class="absolute right-5 top-10 text-slate-300 hover:text-red-500">
                    <i class="fas" [ngClass]="showNew ? 'fa-eye-slash' : 'fa-eye'"></i>
                </button>
            </div>

            <div class="relative">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Xác nhận mật khẩu mới</label>
                <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="passData.confirmPassword" name="confirm"
                       class="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-red-500 transition-all">
                <button type="button" (click)="showConfirm = !showConfirm" class="absolute right-5 top-10 text-slate-300 hover:text-red-500">
                    <i class="fas" [ngClass]="showConfirm ? 'fa-eye-slash' : 'fa-eye'"></i>
                </button>
            </div>
            
            <button type="submit" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-red-200 hover:bg-red-700 transition-all mt-4">
                Xác nhận đổi mật khẩu
            </button>
        </form>
    </div>
  </div>
</div>
